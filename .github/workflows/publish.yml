name: Publish Trex

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: trex-linux-x64
          - os: macos-latest
            artifact_name: trex-macos-arm64
          - os: windows-latest
            artifact_name: trex-win-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Compile Binary
        run: |
          mkdir -p dist
          bun build ./src/index.ts --compile --outfile ./dist/${{ matrix.artifact_name }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write # Essencial para --provenance no NPM moderno
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/trex-linux-x64/trex-linux-x64
            artifacts/trex-macos-arm64/trex-macos-arm64
            artifacts/trex-win-x64.exe/trex-win-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to NPM
        # A publicação só ocorre se o token estiver presente e for um push de tag ou master
        run: |
          npm config set //registry.npmjs.org/:_authToken=${NPM_PUBLISHER_TOKEN}
          # O flag --provenance vincula o pacote ao seu repositório GitHub de forma segura
          npm publish --access public --provenance || echo "Versão já existente ou erro de permissão, ${NPM_PUBLISHER_TOKEN}" && exit 1;
        env:
          NPM_PUBLISHER_TOKEN: ${{ secrets.NPM_PUBLISHER_TOKEN }}