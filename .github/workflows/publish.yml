name: Publish Trex

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Dispara quando você cria uma tag (ex: v1.0.0)

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: trex-linux-x64
            asset_name: trex-linux-x64
          - os: macos-latest
            artifact_name: trex-macos-arm64
            asset_name: trex-macos-arm64
          - os: windows-latest
            artifact_name: trex-win-x64.exe
            asset_name: trex-win-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Compile Binary
        run: |
          mkdir -p dist
          bun build ./src/index.ts --compile --outfile ./dist/${{ matrix.artifact_name }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ./dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/trex-linux-x64/trex-linux-x64
            artifacts/trex-macos-arm64/trex-macos-arm64
            artifacts/trex-win-x64.exe/trex-win-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to NPM
        run: |
          npm config set //registry.npmjs.org/:_authToken=${{ secrets.NPM_PUBLISHER_TOKEN }}
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_PUBLISHER_TOKEN }}